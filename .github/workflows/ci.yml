name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancel an in-flight CI run when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `packageManager` field in root package.json pins pnpm; setup-node
      # picks it up via `cache: 'pnpm'` once corepack is enabled.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      # Some packages don't have a lint script yet — pnpm -r --if-present
      # walks the workspace and skips silently when missing.
      - run: pnpm lint || echo "lint not configured everywhere — see ADRs"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `packageManager` field in root package.json pins pnpm; setup-node
      # picks it up via `cache: 'pnpm'` once corepack is enabled.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `packageManager` field in root package.json pins pnpm; setup-node
      # picks it up via `cache: 'pnpm'` once corepack is enabled.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `packageManager` field in root package.json pins pnpm; setup-node
      # picks it up via `cache: 'pnpm'` once corepack is enabled.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
