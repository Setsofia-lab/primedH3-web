name: secret-scan

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Blocks the job on any finding not covered by .gitleaks.toml
          GITLEAKS_CONFIG: .gitleaks.toml
