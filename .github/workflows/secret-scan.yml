name: secret-scan

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read
  # The action reads pull_request diffs and posts a summary.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is required by gitleaks-action v2 to scan PRs
          # (reads the diff, posts the status check). Scoped to the
          # minimum perms via the `permissions:` block above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Blocks the job on any finding not covered by .gitleaks.toml.
          GITLEAKS_CONFIG: .gitleaks.toml
