name: Deploy backend

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target env (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

# Don't deploy two commits to the same env at once.
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      ENV_NAME: ${{ inputs.env || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
    steps:
      - uses: actions/checkout@v4

      # `packageManager` field in root package.json pins pnpm.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      # Pre-deploy gate: build + test must pass.
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

      - name: Resolve AWS account by env
        id: aws
        run: |
          case "$ENV_NAME" in
            dev)  echo "account=984126996145" >> "$GITHUB_OUTPUT" ;;
            prod) echo "account=492084584502" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown env=$ENV_NAME" >&2; exit 1 ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.aws.outputs.account }}:role/primedhealth-${{ env.ENV_NAME }}-gh-deployer
          aws-region: us-east-1
          role-session-name: gh-deploy-${{ github.run_id }}

      - name: Deploy api stack
        working-directory: infra/cdk
        run: |
          pnpm exec cdk deploy -c env=$ENV_NAME primedhealth-$ENV_NAME-api --require-approval never

      - name: Run db migrations
        env:
          CLUSTER: primedhealth-${{ env.ENV_NAME }}
          FAMILY: primedhealth-${{ env.ENV_NAME }}-migrate
        run: |
          # Read network config from the api stack outputs.
          read -r SUBNETS SG <<<"$(
            aws cloudformation describe-stacks \
              --stack-name "primedhealth-$ENV_NAME-api" --region us-east-1 \
              --query 'Stacks[0].Outputs[?OutputKey==`ServiceSubnetIds` || OutputKey==`ServiceSgId`].OutputValue' \
              --output text
          )"
          echo "Cluster: $CLUSTER"
          echo "Subnets: $SUBNETS"
          echo "SG:      $SG"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$FAMILY" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --count 1 --region us-east-1 \
            --query 'tasks[0].taskArn' --output text)
          echo "Migrate task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" --region us-east-1
          EXIT=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --region us-east-1 \
                  --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --region us-east-1 \
                    --query 'tasks[0].stoppedReason' --output text)
          echo "Exit: $EXIT (${REASON:-no reason})"
          if [ "$EXIT" != "0" ]; then
            echo "::error::migrate task failed: exit $EXIT — $REASON"
            exit 1
          fi
